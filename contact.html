<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start a Project | Proview Media Co.</title>
<meta name="description" content="Tell us about your project. Websites, apps, branding, marketing, or photography — let's build something great together.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#fcfaf8;--dark:#07081f;--accent:#1539b0;--coral:#f15533;
  --radius:6px;--ease:cubic-bezier(.4,0,.2,1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;background:var(--bg);border-bottom:1px solid #edebe4}
.logo{font-size:1.05rem;font-weight:600;color:var(--dark);text-decoration:none;display:flex;align-items:center;gap:8px}
.logo svg{width:20px;height:26px}
.back-link{font-size:.85rem;font-weight:500;color:var(--dark);text-decoration:none;display:flex;align-items:center;gap:6px;opacity:.6;transition:opacity .2s}
.back-link:hover{opacity:1}

/* Page */
.page{max-width:720px;margin:0 auto;padding:140px 24px 80px}
.page h1{font-size:clamp(2rem,4vw,2.8rem);font-weight:600;line-height:1.15;letter-spacing:-.03em;margin-bottom:12px}
.page .sub{font-size:1.05rem;color:#555;line-height:1.6;margin-bottom:48px}

/* Form */
.form-group{margin-bottom:28px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:var(--dark);margin-bottom:10px;letter-spacing:-.01em}
.form-label span{color:#999;font-weight:400;margin-left:4px}

/* Service selector */
.service-options{display:flex;flex-wrap:wrap;gap:8px}
.service-opt{display:none}
.service-opt+label{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid #ddd;border-radius:100px;font-size:.85rem;font-weight:500;color:#555;cursor:pointer;transition:all .2s;user-select:none}
.service-opt+label:hover{border-color:var(--dark);color:var(--dark)}
.service-opt:checked+label{background:var(--dark);color:#fff;border-color:var(--dark)}
.service-opt+label svg{width:16px;height:16px;opacity:.5}
.service-opt:checked+label svg{opacity:1}

/* Inputs */
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
input[type="text"],input[type="email"],textarea{width:100%;padding:14px 18px;border:1px solid #ddd;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:.92rem;color:var(--dark);background:#fff;transition:border-color .2s;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:#aaa}
textarea{min-height:140px;resize:vertical}

/* Budget */
.budget-options{display:flex;flex-wrap:wrap;gap:8px}
.budget-opt{display:none}
.budget-opt+label{padding:10px 20px;border:1px solid #ddd;border-radius:100px;font-size:.85rem;font-weight:500;color:#555;cursor:pointer;transition:all .2s}
.budget-opt+label:hover{border-color:var(--dark);color:var(--dark)}
.budget-opt:checked+label{background:var(--dark);color:#fff;border-color:var(--dark)}

/* Submit */
.submit-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:var(--coral);color:#fff;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .25s}
.submit-btn:hover{background:#d94425;transform:translateY(-2px)}
.submit-btn svg{width:16px;height:16px}

/* Success */
.success-msg{display:none;text-align:center;padding:60px 20px}
.success-msg h2{font-size:1.8rem;font-weight:600;margin-bottom:12px}
.success-msg p{color:#555;font-size:1rem;line-height:1.6;margin-bottom:32px}
.success-msg a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--dark);color:#fff;border-radius:100px;text-decoration:none;font-weight:600;font-size:.85rem}

/* Info bar */
.contact-info{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid #e8e8e8;flex-wrap:wrap}
.contact-info a{font-size:.85rem;color:#555;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.contact-info a:hover{color:var(--dark)}

@media(max-width:600px){
  nav{padding:16px 20px}
  .page{padding:110px 20px 60px}
  .input-row{grid-template-columns:1fr}
  .contact-info{flex-direction:column;gap:16px}
}
</style>
</head>
<body>

<nav>
  <a href="./" class="logo">
    <svg viewBox="0 0 20 26" fill="var(--dark)"><path d="M19.895 9.902L19.009 5.154C18.952 4.855 18.831 4.575 18.656 4.334C18.481 4.094 18.257 3.9 18 3.767V3.346C18 2.473 17.675 1.636 17.098 1.019C16.521.402 15.739.055 14.923.055H5.077C4.261.055 3.479.402 2.902 1.019 2.325 1.636 2 2.473 2 3.346V3.767C1.743 3.9 1.519 4.094 1.344 4.334 1.169 4.575 1.048 4.855.991 5.154L.105 9.902C-.03 10.639.088 11.403.435 12.055.783 12.708 1.338 13.205 2 13.456V22.812C2 23.643 2.309 24.439 2.858 25.027 3.408 25.614 4.152 25.945 4.929 25.945H15.071C15.847 25.945 16.592 25.614 17.142 25.027 17.691 24.439 18 23.643 18 22.812V13.456C18.502 13.273 18.948 12.945 19.288 12.509 19.564 12.149 19.761 11.729 19.866 11.278 19.971 10.828 19.981 10.357 19.895 9.902Z"/></svg>
    Proview Media
  </a>
  <a href="./" class="back-link">&larr; Back to Home</a>
</nav>

<div class="page">
  <div id="form-view">
    <h1>Let's build something together.</h1>
    <p class="sub">Tell us what you need and we'll get back to you within 24 hours. No pressure, no pitch — just a conversation.</p>

    <form id="contact-form" action="https://formsubmit.co/proviewmediaco@gmail.com" method="POST">
      <!-- FormSubmit config -->
      <input type="hidden" name="_subject" value="New Project Inquiry — Proview Media Co.">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="">
      <input type="text" name="_honey" style="display:none">

      <div class="form-group">
        <label class="form-label">What do you need?<span>Select all that apply</span></label>
        <div class="service-options">
          <input type="checkbox" name="services" value="Website" id="svc-web" class="service-opt">
          <label for="svc-web">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Website
          </label>

          <input type="checkbox" name="services" value="Web App" id="svc-app" class="service-opt">
          <label for="svc-app">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
            App
          </label>

          <input type="checkbox" name="services" value="Branding" id="svc-brand" class="service-opt">
          <label for="svc-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Branding
          </label>

          <input type="checkbox" name="services" value="Marketing & SEO" id="svc-mkt" class="service-opt">
          <label for="svc-mkt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            Marketing &amp; SEO
          </label>

          <input type="checkbox" name="services" value="Photography" id="svc-photo" class="service-opt">
          <label for="svc-photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            Photography
          </label>

          <input type="checkbox" name="services" value="E-Commerce" id="svc-ecom" class="service-opt">
          <label for="svc-ecom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            E-Commerce
          </label>

          <input type="checkbox" name="services" value="Other" id="svc-other" class="service-opt">
          <label for="svc-other">Other</label>
        </div>
      </div>

      <div class="input-row">
        <div class="form-group">
          <label class="form-label" for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="john@company.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="company">Company / Business<span>optional</span></label>
        <input type="text" id="company" name="company" placeholder="Your business name">
      </div>

      <div class="form-group">
        <label class="form-label">Budget range<span>optional</span></label>
        <div class="budget-options">
          <input type="radio" name="budget" value="Under $2k" id="b1" class="budget-opt">
          <label for="b1">Under $2k</label>
          <input type="radio" name="budget" value="$2k - $5k" id="b2" class="budget-opt">
          <label for="b2">$2k – $5k</label>
          <input type="radio" name="budget" value="$5k - $10k" id="b3" class="budget-opt">
          <label for="b3">$5k – $10k</label>
          <input type="radio" name="budget" value="$10k+" id="b4" class="budget-opt">
          <label for="b4">$10k+</label>
          <input type="radio" name="budget" value="Not sure" id="b5" class="budget-opt">
          <label for="b5">Not sure yet</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Tell us about your project</label>
        <textarea id="message" name="message" placeholder="What are you building? What problem are you solving? Any timeline in mind?" required></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Send Message
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div class="contact-info">
      <a href="mailto:proviewmediaco@gmail.com">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
        proviewmediaco@gmail.com
      </a>
      <a href="tel:+17025271837">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        (702) 527-1837
      </a>
      <a href="https://www.instagram.com/proviewmediaco/" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        @proviewmediaco
      </a>
    </div>
  </div>
</div>

<script>
// Set the _next redirect to current origin
var nextInput = document.querySelector('input[name="_next"]');
if (nextInput) nextInput.value = window.location.origin + '/contact.html?sent=1';

// Show success if redirected back
if (window.location.search.includes('sent=1')) {
  document.getElementById('form-view').innerHTML = '<div class="success-msg" style="display:block"><h2>Message sent!</h2><p>Thanks for reaching out. We\'ll get back to you within 24 hours.</p><a href="./">&larr; Back to Home</a></div>';
}
</script>
</body>
</html>
